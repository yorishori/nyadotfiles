# ── Paths ─────────────────────────────────────────────────────────────────────
directory: /mnt/server-nya/music/library
library: ~/.local/share/beets/library.db

# ── Import behaviour ──────────────────────────────────────────────────────────
import:
  move: yes         # Matches your script's behavior (moves from inbox to library)
  copy: no          
  write: yes        # Writes corrected tags to files on import
  log: ~/.local/share/beets/import.log
  timid: yes        # Asks for confirmation even on high-confidence matches
  group_albums: yes # Groups messy inbox files logically instead of by folder
  languages: en
  
  default_fields:
    tracknumber: 1
    disc: 1

# ── Path format ───────────────────────────────────────────────────────────────
paths:
  default: $albumartist/$album/%02d$track - $title
  singleton: $albumartist/Singles/$title
  comp: Various Artists/$album/%02d$track - $title

# ── Plugins ───────────────────────────────────────────────────────────────────
plugins:
  - fetchart
  - embedart

# ── Album art ─────────────────────────────────────────────────────────────────
fetchart:
  auto: yes
  sources:
    - filesystem    # checks for cover.jpg/folder.jpg in the source folder first
    - coverart      # MusicBrainz Cover Art Archive
    - itunes
    - amazon
    - wikipedia

embedart:
  auto: yes
  maxwidth: 1000
