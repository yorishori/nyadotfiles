general {
    hide_cursor = false
    grace = 0
    fail_timeout = 1000
}

# ─── Catppuccin Mocha ─────────────────────────────────────────────────────────
source = ~/.config/hypr/extra/mocha.conf

# ─── Background ───────────────────────────────────────────────────────────────
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    brightness = 0.70
    contrast = 0.90
    vibrancy = 0.15
    vibrancy_darkness = 0.0
}

# ─── Card overlay ─────────────────────────────────────────────────────────────
shape {
    monitor =
    size = 440, 520
    color = $base
    rounding = 18
    border_size = 1
    border_color = $surface1
    position = 0, 0
    halign = center
    valign = center
    zindex = 1
}

# ─── Clock ────────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = $text
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 160
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 2
    shadow_size = 4
    shadow_color = $crust
    shadow_boost = 1.2
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = $subtext0
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 88
    halign = center
    valign = center
    zindex = 2
}

# ─── Password input ───────────────────────────────────────────────────────────
input-field {
    monitor =
    size = 320, 52
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.22
    dots_center = true
    dots_rounding = -1

    outer_color = $surface1
    inner_color = $mantle
    font_color = $overlay0
    font_family = JetBrainsMono Nerd Font

    check_color = $green
    fail_color = $red

    placeholder_text = Password
    fail_text = Wrong password

    fade_on_empty = false
    rounding = 10
    position = 0, -20
    halign = center
    valign = center
    zindex = 2
}

# ─── Session buttons ──────────────────────────────────────────────────────────

# Button tray
shape {
    monitor =
    size = 196, 44
    color = $surface0
    rounding = 10
    border_size = 1
    border_color = $surface1
    position = 0, -148
    halign = center
    valign = center
    zindex = 2
}

# Power off
label {
    monitor =
    text = <span>⏻ </span>
    color = $red
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = -56, -148
    halign = center
    valign = center
    zindex = 3
    onclick = hyprshutdown -t 'Shutting down...' --post-cmd 'systemctl poweroff'
}

# Reboot
label {
    monitor =
    text = <span> </span>
    color = $yellow
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, -148
    halign = center
    valign = center
    zindex = 3
    onclick = hyprshutdown -t 'Restarting...' --post-cmd 'systemctl reboot'
}

# Suspend
label {
    monitor =
    text = <span>󰒲 </span>
    color = $sapphire
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 56, -148
    halign = center
    valign = center
    zindex = 3
    onclick = systemctl suspend
}
